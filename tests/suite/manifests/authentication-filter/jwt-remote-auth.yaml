apiVersion: gateway.nginx.org/v1alpha1
kind: AuthenticationFilter
metadata:
  name: jwt-remote-auth
spec:
  type: JWT
  jwt:
    realm: "JWT Remote Authentication"
    source: Remote
    remote:
      uri: https://keycloak.authentication-filter.svc.cluster.local:8443/realms/nginx-gateway/protocol/openid-connect/certs
      caCertificateRefs:
        - name: keycloak-ca-secret
    keyCache: 10m
---
# JWT AuthenticationFilter with Remote source and authorization
apiVersion: gateway.nginx.org/v1alpha1
kind: AuthenticationFilter
metadata:
  name: jwt-remote-authz
spec:
  type: JWT
  jwt:
    realm: "JWT Remote AuthZ"
    source: Remote
    remote:
      uri: https://keycloak.authentication-filter.svc.cluster.local:8443/realms/nginx-gateway/protocol/openid-connect/certs
      caCertificateRefs:
        - name: keycloak-ca-secret
    keyCache: 10m
    authorization:
      require: Any
      rules:
        - require: Any
          claims:
            - name: preferred_username
              match: Exact
              values:
                - "testuser"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jwt-remote-cafe-routes
spec:
  parentRefs:
    - name: auth-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /jwt-remote-coffee
      backendRefs:
        - name: coffee
          port: 80
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.nginx.org
            kind: AuthenticationFilter
            name: jwt-remote-auth
    - matches:
        - path:
            type: PathPrefix
            value: /jwt-remote-tea
      backendRefs:
        - name: tea
          port: 80
    # Route for remote JWT with authorization
    - matches:
        - path:
            type: PathPrefix
            value: /jwt-remote-authz
      backendRefs:
        - name: coffee
          port: 80
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.nginx.org
            kind: AuthenticationFilter
            name: jwt-remote-authz
