# A valid APLogConf compiled by the PLM controller. Mirrors log-illegal.json. PLM compiles it,
# stores the log-profile bundle in SeaweedFS, and writes status.bundle. NGF references it from a
# WAFPolicy securityLogs[*].logRef.apLogConfRef entry.
apiVersion: appprotect.f5.com/v1
kind: APLogConf
metadata:
  name: log-illegal
spec:
  filter:
    request_type: illegal
  content:
    format: default
    max_request_size: any
    max_message_size: 15k
